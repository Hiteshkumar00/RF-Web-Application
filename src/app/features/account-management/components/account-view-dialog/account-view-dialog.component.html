<p-dialog [visible]="visible" [modal]="true" [style]="{ width: '440px' }" [draggable]="false" [resizable]="false"
    [closable]="false" (onHide)="closed.emit()">

    <ng-template pTemplate="header">
        <div class="d-flex align-items-center justify-content-between w-100 pe-3">
            <span class="p-dialog-title m-0">{{ labels.VIEW_DIALOG_TITLE }}</span>
            <p-button icon="pi pi-times" [rounded]="true" [text]="true" severity="secondary" (onClick)="closed.emit()"
                styleClass="p-0" [style]="{ width: '2rem', height: '2rem' }" />
        </div>
    </ng-template>

    <div class="d-flex flex-column gap-3 py-2" *ngIf="account">

        <!-- Account ID -->
        <div class="row align-items-center">
            <div class="col-5">
                <span class="fw-semibold text-muted small">{{ labels.ACCOUNT_ID }}</span>
            </div>
            <div class="col-7">
                <span>{{ account.id }}</span>
            </div>
        </div>

        <p-divider />

        <!-- Profile Name -->
        <div class="row align-items-center">
            <div class="col-5">
                <span class="fw-semibold text-muted small">{{ labels.PROFILE_NAME }}</span>
            </div>
            <div class="col-7">
                <span>{{ account.profileName || '—' }}</span>
            </div>
        </div>

        <p-divider />

        <!-- Currency Type -->
        <div class="row align-items-center">
            <div class="col-5">
                <span class="fw-semibold text-muted small">{{ labels.CURRENCY_TYPE }}</span>
            </div>
            <div class="col-7">
                <span>{{ account.currencyType || '—' }}</span>
            </div>
        </div>

        <p-divider />

        <!-- Profile Logo -->
        <div class="row align-items-center">
            <div class="col-5">
                <span class="fw-semibold text-muted small">{{ labels.PROFILE_LOGO_LINK }}</span>
            </div>
            <div class="col-7">
                @if (account.profileLogoLink) {
                <div class="d-flex flex-column gap-2">
                    <p-image [src]="account.profileLogoLink" width="100" [preview]="true"
                        styleClass="border rounded overflow-hidden" />
                </div>
                } @else {
                <span class="opacity-50">—</span>
                }
            </div>
        </div>

    </div>

    <ng-template pTemplate="footer">
        <div class="d-flex justify-content-end">
            <p-button [label]="labels.CANCEL" icon="pi pi-times" severity="secondary" [text]="true"
                (onClick)="closed.emit()" />
        </div>
    </ng-template>

</p-dialog>
