<p-dialog [visible]="visible" [modal]="true" [style]="{ width: '700px' }" [draggable]="false" [resizable]="false"
    [closable]="false" [closeOnEscape]="false">

    <ng-template pTemplate="header">
        <div class="d-flex align-items-center justify-content-between w-100 pe-3">
            <span class="p-dialog-title m-0">{{ dialogTitle }}</span>
            <p-button icon="pi pi-times" [rounded]="true" [text]="true" severity="secondary" (onClick)="requestClose()"
                styleClass="p-0" [style]="{ width: '2rem', height: '2rem' }" />
        </div>
    </ng-template>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="d-flex flex-column gap-3 pt-2" *ngIf="form">

        <!-- Profile Name -->
        <div>
            <p-floatlabel variant="on">
                <p-iconField iconPosition="right">
                    <input id="profileName" type="text" pInputText formControlName="profileName" class="w-100" />
                    <p-inputIcon *ngIf="form.get('profileName')?.invalid && form.get('profileName')?.touched"
                        class="pi pi-info-circle text-danger pe-2"
                        [pTooltip]="form.get('profileName')?.hasError('required') ? labels.PROFILE_NAME_REQUIRED : labels.PROFILE_NAME_MAX"
                        tooltipPosition="top" />
                </p-iconField>
                <label for="profileName">{{ labels.PROFILE_NAME }}</label>
            </p-floatlabel>
        </div>

        <!-- Profile Logo Link -->
        <div class="d-flex flex-column gap-2 border rounded p-3 bg-opacity-10">
            <p-floatlabel variant="on">
                <input id="profileLogoLink" type="text" pInputText formControlName="profileLogoLink" class="w-100" />
                <label for="profileLogoLink">{{ labels.PROFILE_LOGO_LINK }}</label>
            </p-floatlabel>
            @if (form.get('profileLogoLink')?.value) {
            <div class="mt-1 text-center border rounded p-2 shadow-sm d-flex align-items-center justify-content-center"
                style="min-height: 80px;">
                <p-image [src]="form.get('profileLogoLink')?.value" height="60" [preview]="true"
                    styleClass="border rounded shadow-sm" />
            </div>
            }
        </div>

        <!-- Title / Tagline -->
        <div>
            <p-floatlabel variant="on">
                <input id="title" type="text" pInputText formControlName="title" class="w-100" />
                <label for="title">{{ labels.TITLE }}</label>
            </p-floatlabel>
        </div>

        <!-- Phone & Email Row -->
        <div class="row g-3">
            <div class="col-6">
                <p-floatlabel variant="on">
                    <input id="phone" type="text" pInputText formControlName="phone" class="w-100" />
                    <label for="phone">{{ labels.PHONE }}</label>
                </p-floatlabel>
            </div>
            <div class="col-6">
                <p-floatlabel variant="on">
                    <input id="email" type="text" pInputText formControlName="email" class="w-100" />
                    <label for="email">{{ labels.EMAIL }}</label>
                </p-floatlabel>
            </div>
        </div>

        <!-- GSTIN -->
        <div>
            <p-floatlabel variant="on">
                <input id="gstin" type="text" pInputText formControlName="gstin" class="w-100" />
                <label for="gstin">{{ labels.GSTIN }}</label>
            </p-floatlabel>
        </div>

        <!-- Address -->
        <div>
            <p-floatlabel variant="on">
                <textarea id="address" pInputTextarea formControlName="address" rows="2" class="w-100 py-3"
                    style="resize: none;"></textarea>
                <label for="address">{{ labels.ADDRESS }}</label>
            </p-floatlabel>
        </div>

        <!-- Currency Type -->
        <div>
            <p-floatlabel>
                <p-select id="currencyType" [options]="currencyOptions" formControlName="currencyType"
                    optionLabel="label" optionValue="value" [placeholder]="labels.CURRENCY_TYPE" class="w-100"
                    appendTo="body" [showClear]="true" />
            </p-floatlabel>
        </div>

        <!-- Date Formats Row -->
        <div class="row g-3">
            <div class="col-6">
                <p-floatlabel variant="on">
                    <input id="dateFormat" type="text" pInputText formControlName="dateFormat" class="w-100" />
                    <label for="dateFormat">{{ labels.DATE_FORMAT }}</label>
                </p-floatlabel>
            </div>
            <div class="col-6">
                <p-floatlabel variant="on">
                    <input id="shortDateFormat" type="text" pInputText formControlName="shortDateFormat" class="w-100" />
                    <label for="shortDateFormat">{{ labels.SHORT_DATE_FORMAT }}</label>
                </p-floatlabel>
            </div>
        </div>

        <!-- Enable Suggestions -->
        <div
            class="d-flex align-items-center justify-content-between p-3 border rounded-3 bg-opacity-25 mt-2 shadow-sm transition-all hover-shadow">
            <div class="d-flex flex-column gap-1">
                <span class="fw-bold text-primary pe-2">{{ labels.ENABLE_SUGGESTIONS }}</span>
            </div>
            <p-toggleswitch formControlName="enableSuggestions" />
        </div>

        <!-- Enable Voice Typing -->
        <div
            class="d-flex align-items-center justify-content-between p-3 border rounded-3 bg-opacity-25 mt-2 shadow-sm transition-all hover-shadow">
            <div class="d-flex flex-column gap-1">
                <span class="fw-bold text-info pe-2">Enable Voice Typing</span>
            </div>
            <p-toggleswitch formControlName="enableVoiceTyping" />
        </div>

        <!-- Enable WhatsApp -->
        <div
            class="d-flex align-items-center justify-content-between p-3 border rounded-3 bg-opacity-25 mt-2 shadow-sm transition-all hover-shadow">
            <div class="d-flex flex-column gap-1">
                <span class="fw-bold text-success pe-2">{{ labels.ENABLE_WHATSAPP }}</span>
            </div>
            <p-toggleswitch formControlName="enableWhatsApp" />
        </div>

        <!-- WhatsApp Number -->
        <div *ngIf="form.get('enableWhatsApp')?.value" class="ps-3">
            <p-floatlabel variant="on">
                <input id="whatsAppNumber" type="text" pInputText formControlName="whatsAppNumber" class="w-100" />
                <label for="whatsAppNumber">{{ labels.WHATSAPP_NUMBER }}</label>
            </p-floatlabel>
        </div>

        <!-- Enable Advanced WhatsApp -->
        <div
            class="d-flex align-items-center justify-content-between p-3 border rounded-3 bg-opacity-25 mt-2 shadow-sm transition-all hover-shadow">
            <div class="d-flex flex-column gap-1">
                <span class="fw-bold text-success pe-2">{{ labels.ENABLE_ADVANCED_WHATSAPP }}</span>
            </div>
            <p-toggleswitch formControlName="enableAdvancedWhatsApp" />
        </div>

        <!-- Advanced WhatsApp Details -->
        <div *ngIf="form.get('enableAdvancedWhatsApp')?.value" class="d-flex flex-column gap-3 ps-3">
            <div>
                <p-floatlabel variant="on">
                    <input id="whatsAppPhoneNumberId" type="text" pInputText formControlName="whatsAppPhoneNumberId"
                        class="w-100" />
                    <label for="whatsAppPhoneNumberId">{{ labels.WHATSAPP_PHONE_NUMBER_ID }}</label>
                </p-floatlabel>
            </div>
            <div>
                <p-floatlabel variant="on">
                    <input id="whatsAppBusinessId" type="text" pInputText formControlName="whatsAppBusinessId"
                        class="w-100" />
                    <label for="whatsAppBusinessId">{{ labels.WHATSAPP_BUSINESS_ID }}</label>
                </p-floatlabel>
            </div>
            <div>
                <p-floatlabel variant="on">
                    <input id="whatsAppAccessToken" type="text" pInputText formControlName="whatsAppAccessToken"
                        class="w-100" />
                    <label for="whatsAppAccessToken">{{ labels.WHATSAPP_ACCESS_TOKEN }}</label>
                </p-floatlabel>
            </div>
        </div>

        <!-- Enable Email -->
        <div
            class="d-flex align-items-center justify-content-between p-3 border rounded-3 bg-opacity-25 mt-2 shadow-sm transition-all hover-shadow">
            <div class="d-flex flex-column gap-1">
                <span class="fw-bold text-success pe-2">{{ labels.ENABLE_EMAIL }}</span>
            </div>
            <p-toggleswitch formControlName="enableEmail" />
        </div>

        <!-- Email Details -->
        <div *ngIf="form.get('enableEmail')?.value" class="d-flex flex-column gap-3 ps-3">
            <div class="row g-3">
                <div class="col-6">
                    <p-floatlabel variant="on">
                        <input id="emailSmtpHost" type="text" pInputText formControlName="emailSmtpHost"
                            class="w-100" />
                        <label for="emailSmtpHost">{{ labels.EMAIL_SMTP_HOST }}</label>
                    </p-floatlabel>
                </div>
                <div class="col-6">
                    <p-floatlabel variant="on">
                        <p-inputnumber id="emailSmtpPort" formControlName="emailSmtpPort" [useGrouping]="false"
                            class="w-100" styleClass="w-100" />
                        <label for="emailSmtpPort">{{ labels.EMAIL_SMTP_PORT }}</label>
                    </p-floatlabel>
                </div>
            </div>
            <div>
                <p-floatlabel variant="on">
                    <input id="emailSmtpUsername" type="text" pInputText formControlName="emailSmtpUsername"
                        class="w-100" />
                    <label for="emailSmtpUsername">{{ labels.EMAIL_SMTP_USERNAME }}</label>
                </p-floatlabel>
            </div>
            <div>
                <p-floatlabel variant="on">
                    <p-password id="emailSmtpPassword" formControlName="emailSmtpPassword" [toggleMask]="true"
                        [feedback]="false" styleClass="w-100" inputStyleClass="w-100" />
                    <label for="emailSmtpPassword">{{ labels.EMAIL_SMTP_PASSWORD }}</label>
                </p-floatlabel>
            </div>
            <div class="d-flex align-items-center justify-content-between p-2 border rounded bg-opacity-10">
                <span class="small fw-semibold">{{ labels.EMAIL_SMTP_ENABLE_SSL }}</span>
                <p-toggleswitch formControlName="emailSmtpEnableSsl" />
            </div>
        </div>
    </form>

    <ng-template pTemplate="footer">
        <div class="d-flex gap-2 justify-content-end">
            <p-button [label]="labels.CANCEL" icon="pi pi-times" severity="secondary" [text]="true"
                (onClick)="requestClose()" />
            <p-button *ngIf="mode !== 'view'" [label]="labels.SAVE" icon="pi pi-check" type="button"
                (onClick)="onSubmit()" />
        </div>
    </ng-template>

</p-dialog>
