<div class="d-flex align-items-center justify-content-center vh-100">

    <!-- Theme toggle pinned to top-right -->
    <div style="position: fixed; top: 1rem; right: 1rem;">
        <app-theme-switcher></app-theme-switcher>
    </div>

    <p-card styleClass="login-card">

        <ng-template pTemplate="header">
            <div class="d-flex flex-column align-items-center text-center pt-4 px-4">
                <i class="pi pi-lock mb-2" style="font-size: 2rem;"></i>
                <h2 class="mb-1 fw-bold">{{ labels.SIGN_IN_HEADING }}</h2>
                <p class="mb-0 small opacity-75">{{ labels.SIGN_IN_SUBHEADING }}</p>
            </div>
        </ng-template>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="d-flex flex-column gap-3">

            <div>
                <p-floatlabel variant="on">
                    <input id="email" type="email" pInputText formControlName="email" autocomplete="username"
                        class="w-100" />
                    <label for="email">{{ labels.EMAIL }}</label>
                </p-floatlabel>
                @if (loginForm.get('email')?.invalid && loginForm.get('email')?.touched) {
                <p-message severity="error" size="small" variant="simple" [text]="labels.EMAIL_REQUIRED_ERROR" />
                }
            </div>

            <div>
                <p-floatlabel variant="on">
                    <p-password inputId="password" formControlName="password" [toggleMask]="true" [feedback]="false"
                        styleClass="w-100" inputStyleClass="w-100" autocomplete="current-password">
                    </p-password>
                    <label for="password">{{ labels.PASSWORD }}</label>
                </p-floatlabel>
                @if (loginForm.get('password')?.invalid && (loginForm.get('password')?.dirty ||
                loginForm.get('password')?.touched)) {
                <p-message severity="error" size="small" variant="simple" [text]="labels.PASSWORD_LENGTH_ERROR" />
                }
            </div>

            <p-button [label]="labels.SIGN_IN_BUTTON" icon="pi pi-sign-in" type="submit" styleClass="w-100">
            </p-button>

        </form>
    </p-card>
</div>
