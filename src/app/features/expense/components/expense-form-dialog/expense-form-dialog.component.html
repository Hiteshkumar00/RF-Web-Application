<p-dialog [visible]="visible" [modal]="true" [style]="{ width: '650px' }" [draggable]="false" [resizable]="false"
    [closable]="false" [closeOnEscape]="false">

    <ng-template pTemplate="header">
        <div class="d-flex align-items-center justify-content-between w-100 pe-3">
            <span class="p-dialog-title m-0">{{ dialogTitle }}</span>
            <p-button icon="pi pi-times" [rounded]="true" [text]="true" severity="secondary" (onClick)="requestClose()"
                styleClass="p-0" [style]="{ width: '2rem', height: '2rem' }" />
        </div>
    </ng-template>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="pt-2" *ngIf="form">

        <div class="row g-3">

            <!-- Expense Type -->
            <div class="col-12">
                <p-floatlabel variant="on">
                    <p-iconField iconPosition="right">
                        <p-autoComplete id="expenceType" formControlName="expenceType"
                            [suggestions]="filteredExpenseTypeSuggestions"
                            (completeMethod)="searchExpenseTypes($event)" (onSelect)="onSelectExpenseType($event)"
                            styleClass="w-100" inputStyleClass="w-100 p-inputtext-sm" appendTo="body" [dropdown]="true"
                            [delay]="100" [autofocus]="true" />
                        <p-inputIcon *ngIf="form.get('expenceType')?.invalid && form.get('expenceType')?.touched"
                            class="pi pi-info-circle text-danger pe-6" [pTooltip]="labels.EXPENSE_TYPE_REQUIRED"
                            tooltipPosition="top" />
                    </p-iconField>
                    <label for="expenceType">{{ labels.EXPENSE_TYPE }}</label>
                </p-floatlabel>
            </div>

            <!-- Date -->
            <div class="col-12">
                <p-floatlabel variant="on">
                    <p-iconField iconPosition="right">
                        <p-datepicker id="date" formControlName="date" [showIcon]="true" dateFormat="dd-mm-yy"
                            class="w-100" appendTo="body" size="small" />
                        <p-inputIcon *ngIf="form.get('date')?.invalid && form.get('date')?.touched"
                            class="pi pi-info-circle text-danger ps-2" [pTooltip]="labels.DATE_REQUIRED"
                            tooltipPosition="top" />
                    </p-iconField>
                    <label for="date">{{ labels.DATE }}</label>
                </p-floatlabel>
            </div>

            <div class="col-12 mt-4">
                <div class="d-flex align-items-center justify-content-between mb-3 border-bottom pb-2">
                    <h6 class="mb-0 fw-bold border-start border-4 border-primary ps-2">{{ labels.PAYMENTS_SECTION }}
                    </h6>
                    <p-button *ngIf="mode !== 'view'" icon="pi pi-plus" [label]="labels.ADD_PAYMENT"
                        styleClass="p-button-sm p-button-outlined" (onClick)="addPayment()" />
                </div>

                <p-table [value]="payments.controls"
                    styleClass="p-datatable-sm p-datatable-gridlines border rounded overflow-hidden">
                    <ng-template pTemplate="header">
                        <tr class="bg-light">
                            <th style="width: 50%">{{ labels.PAYMENT_ACCOUNT }}</th>
                            <th style="width: 40%">{{ labels.AMOUNT }}</th>
                            <th style="width: 10%" class="text-center" *ngIf="mode !== 'view'">Action</th>
                        </tr>
                    </ng-template>
                    <ng-template pTemplate="body" let-control let-i="rowIndex">
                        <tr [formGroup]="$any(control)">
                            <td>
                                <p-iconField iconPosition="right">
                                    <p-select [options]="accountOptions" formControlName="paymentAccountId"
                                        optionLabel="label" optionValue="value" [placeholder]="labels.PAYMENT_ACCOUNT"
                                        styleClass="w-100 text-start" appendTo="body" size="small" />
                                    <p-inputIcon
                                        *ngIf="control.get('paymentAccountId')?.invalid && control.get('paymentAccountId')?.touched"
                                        class="pi pi-info-circle text-danger pe-8" [pTooltip]="labels.ACCOUNT_REQUIRED"
                                        tooltipPosition="top" />
                                </p-iconField>
                            </td>
                            <td>
                                <p-iconField iconPosition="right">
                                    <p-inputnumber formControlName="amount" mode="currency" currency="INR"
                                        locale="en-IN" styleClass="w-100" [placeholder]="labels.AMOUNT" size="small" />
                                    <p-inputIcon
                                        *ngIf="control.get('amount')?.invalid && control.get('amount')?.touched"
                                        class="pi pi-info-circle text-danger pe-2" [pTooltip]="labels.AMOUNT_REQUIRED"
                                        tooltipPosition="top" />
                                </p-iconField>
                            </td>
                            <td class="text-center" *ngIf="mode !== 'view'">
                                <p-button icon="pi pi-trash" [rounded]="true" [text]="true" severity="danger"
                                    (onClick)="removePayment(i)" />
                            </td>
                        </tr>
                    </ng-template>
                    <ng-template pTemplate="emptymessage">
                        <tr>
                            <td [attr.colspan]="mode !== 'view' ? 3 : 2" class="text-center p-4 text-muted small">
                                No payments added.
                            </td>
                        </tr>
                    </ng-template>
                </p-table>

                @if (payments.invalid && payments.touched && payments.length === 0) {
                <p-message severity="error" size="small" variant="simple" text="At least one payment source is required"
                    class="mt-2 d-block" />
                }
            </div>

        </div>

    </form>

    <ng-template pTemplate="footer">
        <div class="d-flex gap-2 justify-content-end pt-3" *ngIf="form">
            <p-button [label]="labels.CANCEL" icon="pi pi-times" severity="secondary" [text]="true"
                (onClick)="requestClose()" />
            <p-button *ngIf="mode !== 'view'" [label]="labels.SAVE" icon="pi pi-check" type="button"
                (onClick)="onSubmit()" [disabled]="form.invalid" />
        </div>
    </ng-template>

</p-dialog>
