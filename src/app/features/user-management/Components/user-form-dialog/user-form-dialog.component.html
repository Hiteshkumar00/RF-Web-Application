<p-dialog [visible]="visible" [modal]="true" [style]="{ width: '520px' }" [draggable]="false" [resizable]="false"
    [closable]="false" [closeOnEscape]="false">

    <ng-template pTemplate="header">
        <div class="d-flex align-items-center justify-content-between w-100 pe-3">
            <span class="p-dialog-title m-0">{{ dialogTitle }}</span>
            <p-button icon="pi pi-times" [rounded]="true" [text]="true" severity="secondary" (onClick)="requestClose()"
                styleClass="p-0" [style]="{ width: '2rem', height: '2rem' }" />
        </div>
    </ng-template>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="d-flex flex-column gap-3 pt-2" *ngIf="form">

        <div class="row g-3">

            <!-- First Name -->
            <div class="col-6">
                <p-floatlabel variant="on">
                    <p-iconField iconPosition="right">
                        <input id="firstName" type="text" pInputText formControlName="firstName" class="w-100" />
                        <p-inputIcon *ngIf="form.get('firstName')?.invalid && form.get('firstName')?.touched"
                            class="pi pi-info-circle text-danger pe-2"
                            [pTooltip]="form.get('firstName')?.hasError('required') ? labels.FIRST_NAME_REQUIRED : labels.FIRST_NAME_MAX"
                            tooltipPosition="top" />
                    </p-iconField>
                    <label for="firstName">{{ labels.FIRST_NAME }}</label>
                </p-floatlabel>
            </div>

            <!-- Middle Name -->
            <div class="col-6">
                <p-floatlabel variant="on">
                    <input id="middleName" type="text" pInputText formControlName="middleName" class="w-100" />
                    <label for="middleName">{{ labels.MIDDLE_NAME }}</label>
                </p-floatlabel>
            </div>

            <!-- Surname -->
            <div class="col-6">
                <p-floatlabel variant="on">
                    <p-iconField iconPosition="right">
                        <input id="surname" type="text" pInputText formControlName="surname" class="w-100" />
                        <p-inputIcon *ngIf="form.get('surname')?.invalid && form.get('surname')?.touched"
                            class="pi pi-info-circle text-danger pe-2"
                            [pTooltip]="form.get('surname')?.hasError('required') ? labels.SURNAME_REQUIRED : labels.SURNAME_MAX"
                            tooltipPosition="top" />
                    </p-iconField>
                    <label for="surname">{{ labels.SURNAME }}</label>
                </p-floatlabel>
            </div>

            <!-- Phone No -->
            <div class="col-6">
                <p-floatlabel variant="on">
                    <input id="phoneNo" type="tel" pInputText formControlName="phoneNo" class="w-100" />
                    <label for="phoneNo">{{ labels.PHONE_NO }}</label>
                </p-floatlabel>
            </div>

            <!-- Email -->
            <div class="col-12">
                <p-floatlabel variant="on">
                    <p-iconField iconPosition="right">
                        <input id="email" type="email" pInputText formControlName="email" class="w-100" />
                        <p-inputIcon *ngIf="form.get('email')?.invalid && form.get('email')?.touched"
                            class="pi pi-info-circle text-danger pe-2" [pTooltip]="labels.EMAIL_REQUIRED"
                            tooltipPosition="top" />
                    </p-iconField>
                    <label for="email">{{ labels.EMAIL }}</label>
                </p-floatlabel>
            </div>

            <!-- Role -->
            <div class="col-12">
                <p-floatlabel>
                    <p-iconField iconPosition="right">
                        <p-select id="role" [options]="roleOptions" formControlName="role" optionLabel="label"
                            optionValue="value" [placeholder]="labels.ROLE" class="w-100" appendTo="body" />
                        <p-inputIcon *ngIf="form.get('role')?.invalid && form.get('role')?.touched"
                            class="pi pi-info-circle text-danger pe-8" [pTooltip]="labels.ROLE_REQUIRED"
                            tooltipPosition="top" />
                    </p-iconField>
                </p-floatlabel>
            </div>

            <!-- Account (shown for Admin/SuperAdmin roles) -->
            @if (showAccountField) {
            <div class="col-12">
                <p-floatlabel>
                    <p-iconField iconPosition="right">
                        <p-select id="accountId" [options]="accountOptions" formControlName="accountId"
                            optionLabel="label" optionValue="value" [placeholder]="labels.ACCOUNT" [showClear]="true"
                            class="w-100" appendTo="body" />
                        <p-inputIcon *ngIf="form.get('accountId')?.invalid && form.get('accountId')?.touched"
                            class="pi pi-info-circle text-danger pe-8" [pTooltip]="labels.ACCOUNT_REQUIRED"
                            tooltipPosition="top" />
                    </p-iconField>
                </p-floatlabel>
            </div>
            }

            <!-- Password (create only) -->
            @if (mode === 'create') {
            <div class="col-12">
                <p-floatlabel variant="on">
                    <p-iconField iconPosition="right">
                        <p-password inputId="password" formControlName="password" [toggleMask]="true" [feedback]="false"
                            styleClass="w-100" inputStyleClass="w-100" autocomplete="new-password" />
                        <p-inputIcon
                            *ngIf="form.get('password')?.invalid && (form.get('password')?.dirty || form.get('password')?.touched)"
                            class="pi pi-info-circle text-danger pe-2"
                            [pTooltip]="form.get('password')?.hasError('required') ? labels.PASSWORD_REQUIRED : labels.PASSWORD_MIN"
                            tooltipPosition="top" />
                    </p-iconField>
                    <label for="password">{{ labels.PASSWORD }}</label>
                </p-floatlabel>
            </div>
            }

            <!-- Is Active -->
            <div class="col-12 d-flex align-items-center gap-2">
                <p-checkbox inputId="isActive" formControlName="isActive" [binary]="true" />
                <label for="isActive" class="mb-0">{{ labels.IS_ACTIVE }}</label>
            </div>

        </div>

    </form>

    <ng-template pTemplate="footer">
        <div class="d-flex gap-2 justify-content-end">
            <p-button [label]="labels.CANCEL" icon="pi pi-times" severity="secondary" [text]="true"
                (onClick)="requestClose()" />
            <p-button [label]="labels.SAVE" icon="pi pi-check" type="button" (onClick)="onSubmit()" />
        </div>
    </ng-template>

</p-dialog>
