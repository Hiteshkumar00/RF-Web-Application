<div class="flex items-center gap-2">
    <button type="button" 
            class="p-button p-button-rounded p-button-text p-button-secondary" 
            (click)="onThemeToggler()">
        <i [class]="'pi ' + iconClass()"></i>
    </button>

    <p-selectButton 
        [options]="presets" 
        [ngModel]="selectedPreset()" 
        (ngModelChange)="onPresetChange($event)" 
        [unselectable]="false">
    </p-selectButton>
</div>
